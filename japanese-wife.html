<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Почему стоит жениться на японке ❤️</title>
  <style>
    body {
      margin: 0;
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #ff8fab, #ffe5ec, #c3a6ff);
      color: #333;
      text-align: center;
      min-height: 100vh;
      padding: 20px;
    }

    h1 {
      font-size: 3rem;
      color: #d63384;
      text-shadow: 0 4px 15px rgba(214, 51, 132, 0.3);
      margin-bottom: 10px;
    }

    .subtitle {
      font-size: 1.4rem;
      color: #6b4e9e;
      margin-bottom: 40px;
    }

    .container {
      max-width: 1000px;
      margin: 0 auto;
    }

    .buttons {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
      gap: 18px;
      margin: 40px 0;
    }

    button {
      padding: 20px 25px;
      font-size: 1.25rem;
      background: white;
      color: #d63384;
      border: 3px solid #ff8fab;
      border-radius: 20px;
      cursor: pointer;
      transition: all 0.4s ease;
      box-shadow: 0 8px 25px rgba(255, 143, 171, 0.4);
      font-weight: 600;
    }

    button:hover {
      transform: translateY(-12px) scale(1.06);
      background: #fff0f5;
      border-color: #d63384;
      box-shadow: 0 15px 35px rgba(214, 51, 132, 0.5);
    }

    .info {
      margin: 30px auto;
      padding: 30px;
      background: white;
      border-radius: 25px;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.1);
      min-height: 180px;
      font-size: 1.25rem;
      line-height: 1.7;
      color: #444;
      max-width: 800px;
    }

    .emoji {
      font-size: 3rem;
      margin-bottom: 15px;
    }

    footer {
      margin-top: 60px;
      color: #777;
      font-size: 1.1rem;
    }
  </style>
    <script type="text/javascript">
    (function(c,l,a,r,i,t,y){
        c[a]=c[a]function(){(c[a].q=c[a].q[]).push(arguments)};
        t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
        y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
    })(window, document, "clarity", "script", "wc50oj13rb");
</script>
</head>
<body>
  <div class="container">
    <h1>💍 Почему стоит жениться на японке</h1>
    <p class="subtitle">10 очень убедительных причин (с лёгким японским шармом)</p>

    <div class="buttons">
      <button onclick="showReason(1)">🍱 Вкусная еда каждый день</button>
      <button onclick="showReason(2)">🏠 Идеальный порядок в доме</button>
      <button onclick="showReason(3)">🎀 Милая и кавайная</button>
      <button onclick="showReason(4)">🧠 Умная и воспитанная</button>
      <button onclick="showReason(5)">⛩️ Уважение к мужчине</button>
      <button onclick="showReason(6)">🌸 Красота на генетическом уровне</button>
      <button onclick="showReason(7)">🎮 Понимает твою любовь к аниме</button>
      <button onclick="showReason(8)">💖 Верность и преданность</button>
      <button onclick="showReason(9)">🧘‍♀️ Спокойный и гармоничный характер</button>
      <button onclick="showReason(10)">❤️ Будет звать тебя «Ана́та»</button>
    </div>

    <div class="info" id="infoBox">
      <p class="emoji">❤️</p>
      <h2>Нажми на любую кнопку</h2>
      <p>И узнай, почему японки — это особый уровень</p>
    </div>
  </div>

  <footer>
    Шуточный сайт • Сделано с любовью к Японии и её девушкам ❤️<br>
    (Но на самом деле любовь — это всегда взаимно и индивидуально)
  </footer>

  <script>
    const reasons = {
      1: `<p class="emoji">🍱</p><h2>Вкусная еда каждый день</h2><p>Бенто, суши, рамен, окономияки, домашние онигири... Ты будешь есть как в ресторане, но каждый день.</p>`,

      2: `<p class="emoji">🏠</p><h2>Идеальный порядок в доме</h2><p>Японки с детства приучены к чистоте. Твоя квартира будет выглядеть как из Pinterest.</p>`,

      3: `<p class="emoji">🎀</p><h2>Милая и кавайная</h2><p>От поклонов и "сумимасен" до кошачьих ушек и голоса на +500 к милоте.</p>`,

      4: `<p class="emoji">🧠</p><h2>Умная и хорошо воспитанная</h2><p>Высокий уровень образования + традиционные ценности.</p>`,

      5: `<p class="emoji">⛩️</p><h2>Уважение к мужчине</h2><p>В японской культуре мужчина всё ещё глава семьи, и это очень приятно ощущать.</p>`,

      6: `<p class="emoji">🌸</p><h2>Красота на генетическом уровне</h2><p>Фарфоровая кожа, миндалевидные глаза, изящная фигура — японки часто выглядят моложе своих лет.</p>`,

      7: `<p class="emoji">🎮</p><h2>Понимает твою любовь к аниме и играм</h2><p>Не будет спрашивать "зачем ты опять смотришь мультики", а скорее сядет рядом.</p>`,

      8: `<p class="emoji">💖</p><h2>Верность и преданность</h2><p>Развод в Японии всё ещё считается чем-то крайне нежелательным. Японки обычно очень серьёзно относятся к браку.</p>`,

      9: `<p class="emoji">🧘‍♀️</p><h2>Спокойный и гармоничный характер</h2><p>Меньше скандалов, больше "давай спокойно поговорим".</p>`,

      10: `<p class="emoji">❤️</p><h2>Будет звать тебя «Анáта»</h2><p>Представь: приходишь домой, а она говорит нежным голосом: "Окаэри, аната~" ❤️</p>`
    };

    function showReason(num) {
      const infoBox = document.getElementById('infoBox');
      infoBox.innerHTML = reasons[num];
      
      // лёгкая анимация
      infoBox.style.opacity = 0;
      setTimeout(() => {
        infoBox.style.transition = 'opacity 0.6s';
        infoBox.style.opacity = 1;
      }, 50);
    }

    // При загрузке показываем случайную причину
    window.onload = () => {
      const randomNum = Math.floor(Math.random() * 10) + 1;
      showReason(randomNum);
    };
  </script>
</body>
</html>
